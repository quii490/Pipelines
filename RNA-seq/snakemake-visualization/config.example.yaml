outdir: rnaseq_snakemake_downstream
species: hg38

# Optional. Useful when Snakemake and R packages live in different envs.
# Example on the mounted pod: conda run -n downstream Rscript
rscript: Rscript

# Design files generated by run_auto_rnaseq.sh or prepared manually.
sample_table: /path/to/rnaseq_results/condition.csv
contrast_file: /path/to/rnaseq_results/contrast.csv

# Shared annotation paths. Matrix-level values can override these.
tx2gene_path: /path/to/reference/human_hg38/gencode.v49.primary_assembly.annotation.gtf
te_annotation_tsv: /path/to/rnaseq_results/plots/te_annotation.preview.csv

# Thresholds shared by diff/annotation/visualization.
padj_cutoff: 0.05
lfc_cutoff: 0.58
baseMean_min: 5
label_top_n: 40
volcano_orientation: classic
gray_nonsig: true
diff_threads: 1

# Optional modules.
run_pathway: true
run_go: true
run_gsea: true
disable_gseaplot2: false
run_te_analysis: true

# Add one or more matrices. Paths can be outputs from the main downstream,
# rnaseq-bam-to-counts, TElocal/TEtranscripts, Salmon, or any compatible CSV.
matrices:
  gene_featureCounts:
    type: gene
    path: /path/to/rnaseq_results/plots/gene_featureCounts/gene_featureCounts_matrix.csv
    tx2gene_path: /path/to/reference/human_hg38/gencode.v49.primary_assembly.annotation.gtf

  TE_TEtranscripts_repName:
    type: te
    path: /path/to/rnaseq_results/plots/TE_TEtranscripts_repName_matrix.csv
    te_annotation_tsv: /path/to/rnaseq_results/plots/te_annotation.preview.csv
    te_label_level: repName
    te_color_level: repFamily

  TE_TEtranscripts_repFamily:
    type: te
    path: /path/to/rnaseq_results/plots/TE_TEtranscripts_repFamily_matrix.csv
    te_annotation_tsv: /path/to/rnaseq_results/plots/te_annotation.preview.csv
    te_label_level: repFamily
    te_color_level: repClass
