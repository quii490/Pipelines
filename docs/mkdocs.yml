site_name: Lab Bioinformatics Pipelines
site_description: RNA-seq、ATAC-seq 与 CUT&RUN/CUT&Tag/ChIP-seq 中文使用文档
site_url: https://quii490.github.io/Pipelines/
repo_url: https://github.com/quii490/Pipelines
repo_name: quii490/Pipelines
edit_uri: edit/main/docs/content/
docs_dir: content
site_dir: site
use_directory_urls: true
exclude_docs: |
  maintenance/
  page-templates/

theme:
  name: material
  language: zh
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn

nav:
  - 首页: index.md
  - 入门指南:
      - getting-started/index.md
      - 系统与安装: getting-started/installation.md
      - 命令行最小知识: getting-started/command-line.md
      - 通用运行流程: getting-started/common-workflow.md
      - 命名与目录: getting-started/naming.md
      - 参考基因组: getting-started/references.md
      - 数据安全: getting-started/security.md
  - Pipelines:
      - RNA-seq:
          - pipelines/rnaseq/index.md
          - Quick Start: pipelines/rnaseq/quick-start.md
          - 输入准备: pipelines/rnaseq/input.md
          - 运行: pipelines/rnaseq/running.md
          - 按现有文件选择入口: pipelines/rnaseq/recipes.md
          - 参数: pipelines/rnaseq/parameters.md
          - Workflow: pipelines/rnaseq/workflow.md
          - 输出: pipelines/rnaseq/outputs.md
          - QC: pipelines/rnaseq/qc.md
          - 下游与 TE: pipelines/rnaseq/downstream.md
          - 故障排查: pipelines/rnaseq/troubleshooting.md
      - ATAC-seq:
          - pipelines/atacseq/index.md
          - Quick Start: pipelines/atacseq/quick-start.md
          - 输入准备: pipelines/atacseq/input.md
          - 运行: pipelines/atacseq/running.md
          - 按现有文件选择入口: pipelines/atacseq/recipes.md
          - 参数: pipelines/atacseq/parameters.md
          - Workflow: pipelines/atacseq/workflow.md
          - 输出: pipelines/atacseq/outputs.md
          - QC: pipelines/atacseq/qc.md
          - 下游与 TE: pipelines/atacseq/downstream.md
          - 故障排查: pipelines/atacseq/troubleshooting.md
      - CUT&RUN / CUT&Tag / ChIP-seq:
